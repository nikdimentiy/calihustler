<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bgG" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#0d1f3a"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <linearGradient id="ringG1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff2d78"/>
    </linearGradient>
    <linearGradient id="ringG2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#bf5fff" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="shineG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPink" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cc"><circle cx="50" cy="50" r="48.5"/></clipPath>
  </defs>

  <!-- Drop shadow layer -->
  <circle cx="50" cy="53" r="46" fill="rgba(0,0,0,0.55)"/>

  <!-- Main background -->
  <circle cx="50" cy="50" r="49" fill="url(#bgG)"/>

  <!-- Shine overlay -->
  <circle cx="50" cy="50" r="49" fill="url(#shineG)"/>

  <!-- Subtle grid texture -->
  <g clip-path="url(#cc)" opacity="0.045">
    <line x1="0" y1="25" x2="100" y2="25" stroke="#00f5ff" stroke-width="0.6"/>
    <line x1="0" y1="50" x2="100" y2="50" stroke="#00f5ff" stroke-width="0.6"/>
    <line x1="0" y1="75" x2="100" y2="75" stroke="#00f5ff" stroke-width="0.6"/>
    <line x1="25" y1="0" x2="25" y2="100" stroke="#00f5ff" stroke-width="0.6"/>
    <line x1="50" y1="0" x2="50" y2="100" stroke="#00f5ff" stroke-width="0.6"/>
    <line x1="75" y1="0" x2="75" y2="100" stroke="#00f5ff" stroke-width="0.6"/>
  </g>

  <!-- Outer glow ring (gradient) -->
  <circle cx="50" cy="50" r="46.5" fill="none" stroke="url(#ringG1)" stroke-width="2.2" filter="url(#glowSoft)"/>

  <!-- Second ring (thinner, offset gradient) -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="url(#ringG2)" stroke-width="0.8"/>

  <!-- Inner dashed orbit ring -->
  <circle cx="50" cy="50" r="37.5" fill="none" stroke="rgba(0,245,255,0.18)" stroke-width="0.6" stroke-dasharray="3.2 2.8"/>

  <!-- Cardinal dot — top (pink) -->
  <circle cx="50" cy="4.5" r="3" fill="#ff2d78" filter="url(#glowPink)"/>
  <!-- Cardinal dot — bottom (pink) -->
  <circle cx="50" cy="95.5" r="3" fill="#ff2d78" filter="url(#glowPink)"/>
  <!-- Cardinal dot — left (cyan) -->
  <circle cx="4.5" cy="50" r="2" fill="#00f5ff" filter="url(#glowSoft)" opacity="0.7"/>
  <!-- Cardinal dot — right (cyan) -->
  <circle cx="95.5" cy="50" r="2" fill="#00f5ff" filter="url(#glowSoft)" opacity="0.7"/>

  <!-- Top label: FIVE2FIVE -->
  <text x="50" y="27"
        font-family="'Courier New', Courier, monospace"
        font-size="6.2" font-weight="bold"
        fill="rgba(0,245,255,0.7)"
        text-anchor="middle"
        letter-spacing="1.8"
        filter="url(#glowSoft)">FIVE2FIVE</text>

  <!-- Thin rule below top label -->
  <line x1="20" y1="30" x2="80" y2="30" stroke="rgba(0,245,255,0.2)" stroke-width="0.5"/>

  <!-- Left "5" numeral -->
  <text x="27" y="64"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="38" font-weight="900"
        fill="#ffd700"
        text-anchor="middle"
        filter="url(#glow)">5</text>

  <!-- Center diamond -->
  <polygon points="50,43 56,51 50,59 44,51"
           fill="#00f5ff"
           filter="url(#glow)"
           opacity="0.95"/>
  <!-- Inner diamond highlight -->
  <polygon points="50,46.5 53.5,51 50,55.5 46.5,51"
           fill="rgba(255,255,255,0.25)"/>

  <!-- Right "5" numeral -->
  <text x="73" y="64"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="38" font-weight="900"
        fill="#ffd700"
        text-anchor="middle"
        filter="url(#glow)">5</text>

  <!-- Thin rule above bottom label -->
  <line x1="20" y1="70" x2="80" y2="70" stroke="rgba(0,245,255,0.2)" stroke-width="0.5"/>

  <!-- Bottom label: FOCUS -->
  <text x="50" y="80"
        font-family="'Courier New', Courier, monospace"
        font-size="7" font-weight="bold"
        fill="rgba(0,245,255,0.6)"
        text-anchor="middle"
        letter-spacing="4"
        filter="url(#glowSoft)">FOCUS</text>

  <!-- Corner bracket accents -->
  <path d="M14 18 L14 12 L20 12" fill="none" stroke="rgba(0,245,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M86 18 L86 12 L80 12" fill="none" stroke="rgba(0,245,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M14 82 L14 88 L20 88" fill="none" stroke="rgba(0,245,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M86 82 L86 88 L80 88" fill="none" stroke="rgba(0,245,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>
</svg>
